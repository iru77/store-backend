# ===== ToyLand India - Application Configuration =====

# Server
server.port=8080

# ===== DATABASE (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/toystore_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.secret=ToyLandIndia2024SecretKeyForJWTTokenGeneration$ecureKeyAtLeast256Bits
jwt.expiration=86400000

# ===== CORS =====
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.com.toystore=DEBUG
logging.level.org.springframework.security=WARN
